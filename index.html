<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PixelVest · ข่าวหุ้น</title>
<meta name="description" content="PixelVest — ข่าวหุ้น บทวิเคราะห์ และข้อมูลราคา สำหรับนักลงทุนไทย">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/widgets.css">
</head>
<body>

<div id="app"></div>

<div id="pv-settings">
  <div id="pv-panel">
    <div class="row">
      <h4>ธีม</h4>
      <div class="pv-swatches">
        <div class="pv-swatch" data-theme="warm">Warm</div>
        <div class="pv-swatch" data-theme="modern">Modern</div>
        <div class="pv-swatch" data-theme="mono">Mono</div>
      </div>
    </div>
    <div class="row">
      <h4>ขนาดตัวอักษร</h4>
      <input id="pv-fs" type="range" min="0.9" max="1.15" step="0.05" value="1">
    </div>
    <div class="row">
      <label class="pv-toggle">แถบราคาตลาด<input id="pv-ticker" type="checkbox" checked></label>
    </div>
  </div>
  <button id="pv-gear" title="ตั้งค่าธีม">&#9881;</button>
</div>

<script src="js/data.js?v=8"></script>
<script src="js/quotes.js?v=8"></script>
<script src="js/articles.js?v=9"></script>
<script src="js/config.js?v=9"></script>
<script src="js/helpers.js?v=8"></script>
<script src="js/views.js?v=13"></script>
<script src="js/app.js?v=9"></script>

</body>
</html>
