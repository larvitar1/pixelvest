<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#ece6db}
  @keyframes tickerflow{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  ::selection{background:rgba(176,134,58,.22)}
  [data-card]{transition:transform .18s ease, box-shadow .18s ease}
  [data-card]:hover{transform:translateY(-3px)}
  [data-link]{transition:color .15s ease}
  #app{
    min-height:100vh;
    --paper:#f2efe9; --surface:#faf8f3; --surface-2:#eae5db; --ink:#1c1a16;
    --ink-2:#5c554b; --ink-3:#9a9286; --line:#d8d0c2; --up:#1d7a50; --down:#b23722;
    --gold:#8a6a2c; --radius:4px; --shadow:none; --head:'Noto Serif Thai',serif; --fs:1;
    background:var(--paper); color:var(--ink);
    font-family:'IBM Plex Sans Thai',system-ui,sans-serif; font-size:calc(16px * var(--fs)); line-height:1.6;
  }
  @media(max-width:880px){
   [data-main]{flex-direction:column !important}
   [data-side]{width:100% !important;flex:none !important;position:static !important}
   [data-hidesm]{display:none !important}
   [data-herogrid]{grid-template-columns:1fr !important}
   [data-statgrid]{grid-template-columns:repeat(2,1fr) !important}
   [data-stockhead]{flex-direction:column !important;align-items:flex-start !important}
   [data-pad]{padding-left:18px !important;padding-right:18px !important}
  }
  /* settings widget */
  #pv-settings{position:fixed;right:18px;bottom:18px;z-index:80;font-family:'IBM Plex Sans Thai',sans-serif}
  #pv-gear{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;background:#1c1a16;color:#f2efe9;
    box-shadow:0 8px 22px -8px rgba(0,0,0,.5);display:grid;place-items:center;font-size:20px}
  #pv-panel{position:absolute;right:0;bottom:58px;width:236px;background:#faf8f3;border:1px solid #d8d0c2;
    border-radius:14px;box-shadow:0 18px 44px -18px rgba(0,0,0,.4);padding:16px;display:none}
  #pv-panel.open{display:block}
  #pv-panel h4{margin:0 0 10px;font-size:12px;letter-spacing:.05em;color:#5c554b;text-transform:uppercase}
  #pv-panel .row+.row{margin-top:16px}
  .pv-swatches{display:flex;gap:8px}
  .pv-swatch{flex:1;border:2px solid transparent;border-radius:9px;padding:8px 0;cursor:pointer;font-size:12px;
    font-weight:600;color:#1c1a16;background:#eae5db;text-align:center}
  .pv-swatch.active{border-color:#8a6a2c}
  #pv-panel input[type=range]{width:100%}
  .pv-toggle{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:#1c1a16}
</style>
</head>
<body>
<div id="app"></div>

<div id="pv-settings">

    <div class="row">

</div>

/* ============================ HELPERS ============================ */
function walk(seed, n, drift){
  let s = seed * 9301 + 49297, v = 50, out = [];
  for (let i = 0; i < n; i++){
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const r = (s / 0x7fffffff) - 0.5;
    v = Math.max(8, v + r * 9 + drift);
    out.push(v);
  }
  return out;
}
function chart(data, o){
  o = o || {};
  const w = o.w || 600, h = o.h || 160, color = o.color || '#1f9d6b', sw = o.sw || 2.4, pad = o.pad != null ? o.pad : 5;
  const min = Math.min(...data), max = Math.max(...data), rng = (max - min) || 1;
  const X = i => (i / (data.length - 1)) * w;
  const Y = v => pad + (1 - (v - min) / rng) * (h - pad * 2);
  let line = '';
  data.forEach((v, i) => { line += (i ? 'L' : 'M') + X(i).toFixed(1) + ' ' + Y(v).toFixed(1) + ' '; });
  const area = 'M0 ' + h + ' ' + line.replace('M', 'L') + 'L' + w + ' ' + h + ' Z';
  const areaPath = o.fill !== false ? '<path d="' + area + '" fill="' + color + '" opacity="0.1"/>' : '';
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%;height:100%;display:block;overflow:visible">'
    + areaPath
    + '<path d="' + line.trim() + '" fill="none" stroke="' + color + '" stroke-width="' + sw + '" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/></svg>';
}
function bars(data, color){
  const w = 600, h = 60, max = Math.max(...data), bw = w / data.length;
  const rects = data.map((v, i) =>
    '<rect x="' + (i * bw + bw * 0.18) + '" y="' + (h - (v / max) * h) + '" width="' + (bw * 0.64) + '" height="' + ((v / max) * h) + '" fill="' + color + '" opacity="0.5"/>'
  ).join('');
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%;height:100%;display:block">' + rects + '</svg>';
}
const col = p => p >= 0 ? 'var(--up)' : 'var(--down)';
const arr = p => p >= 0 ? '▲' : '▼';
const pctStr = p => (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
const money = (n, d = 2) => n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const stockOf = sym => STOCKS.find(s => s.sym === sym) || STOCKS[0];
const artOf = id => ARTS.find(a => a.id === id) || ARTS[0];

function decStock(s, big){
  const len = big ? rangeLens[state.range] : 60;
  const color = s.pct >= 0 ? upHex : downHex;
  return {
    sym: s.sym, name: s.name, sector: s.sector,
    price: money(s.price), pct: pctStr(s.pct), arrow: arr(s.pct), color: col(s.pct),
    chgAbs: money(Math.abs(s.price * s.pct / 100)),
    spark: chart(walk(s.sd, 22, s.pct >= 0 ? 0.4 : -0.4), { w:120, h:36, color, sw:1.7 }),
    chart: chart(walk(s.sd, 30, s.pct >= 0 ? 0.4 : -0.4), { w:200, h:44, color, sw:2 }),
    bigChart: chart(walk(s.sd, len, s.pct >= 0 ? 0.35 : -0.35), { w:600, h:280, color, sw:2.6 }),
    volChart: bars(walk(s.sd + 3, len, 0), color),
  };
}
function decArt(a){
  return { id:a.id, cat:a.cat, title:a.title, excerpt:a.excerpt, author:a.author, date:a.date, read:a.read,
    initial:(a.author || 'P')[0], rank:a.rank, tags:a.tags || [a.cat] };
}

/* ============================ NAV ============================ */
function go(page, id){
  state.history = [...state.history, state.route];
  state.route = { page, id };
  window.scrollTo({ top:0 });
  render();
}
function back(){
  if (!state.history.length){ state.route = { page:'home' }; }
  else { const h = [...state.history]; state.route = h.pop(); state.history = h; }
  window.scrollTo({ top:0 });
  render();
}

function newsView(){
  const isoMap = { 1:'2026-06-27', 2:'2026-06-27', 3:'2026-06-26', 4:'2026-06-26', 5:'2026-06-25', 6:'2026-06-24', 7:'2026-06-23', 8:'2026-06-23' };
  const thMonth = 'มิถุนายน 2026';
  const arts = [...ARTS].sort((a, b) => isoMap[b.id].localeCompare(isoMap[a.id]) || b.id - a.id);
  const groups = [];
  arts.forEach(a => {
    const iso = isoMap[a.id];
    let g = groups.find(x => x.iso === iso);
    if (!g){ g = { iso, thaiDate: parseInt(iso.split('-')[2], 10) + ' ' + thMonth, count:0, items:[] }; groups.push(g); }
    g.count++;
    g.items.push({ id:a.id, title:a.title, excerpt:a.excerpt, cat:a.cat, badges:a.syms.slice(0, 3).map(s => '$' + s), dateLabel:a.date, read:a.read });
  });

  const groupsHtml = groups.map(g => {
    const items = g.items.map(n => {
      const badges = n.badges.map(b =>
        '<span style="display:inline-flex;align-items:center;font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--paper);background:var(--ink);padding:4px 9px;border-radius:7px;">' + b + '</span>'
      ).join('');
      return '<div data-card data-article="' + n.id + '" style="cursor:pointer;display:flex;gap:18px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 22px;box-shadow:var(--shadow);">'
        + '<div style="display:flex;flex-direction:column;gap:6px;flex:none;width:86px;align-items:flex-start;padding-top:2px;">' + badges + '</div>'
        + '<div style="flex:1;min-width:0;">'
        +   '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--ink-3);margin-bottom:7px;">' + n.dateLabel + ' · ' + n.cat + ' · อ่าน ' + n.read + ' นาที</div>'
        +   '<div style="font-size:16.5px;line-height:1.6;"><strong style="font-weight:700;color:var(--ink);">' + esc(n.title) + '</strong> <span style="color:var(--ink-2);">— ' + esc(n.excerpt) + '</span></div>'
        + '</div></div>';
    }).join('');
    return '<div style="position:relative;padding-left:38px;margin-bottom:34px;">'
      + '<span style="position:absolute;left:0;top:7px;width:14px;height:14px;border-radius:50%;background:var(--gold);border:3px solid var(--paper);box-sizing:border-box;"></span>'
      + '<h2 style="font-family:var(--head);font-size:27px;font-weight:700;margin:0;letter-spacing:-.01em;">' + g.thaiDate + '</h2>'
      + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--ink-3);margin:5px 0 18px;">' + g.iso + ' · ' + g.count + ' ข่าว</div>'
      + '<div style="display:flex;flex-direction:column;gap:16px;">' + items + '</div>'
      + '</div>';
  }).join('');

  const backLink = state.history.length > 0
    ? '<div data-link data-back style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-2);margin-bottom:18px;">← ย้อนกลับ</div>'
    : '';

  return '<main data-pad style="max-width:880px;margin:0 auto;padding:46px 28px 10px;">'
    + backLink
    + '<h1 style="font-family:var(--head);font-size:46px;font-weight:700;margin:0;letter-spacing:-.02em;">ข่าวหุ้นล่าสุด</h1>'
    + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:13px;color:var(--ink-3);margin-top:12px;">อัปเดตล่าสุด: 27 มิถุนายน 2026, 16:30 · ทั้งหมด ' + arts.length + ' ข่าว</div>'
    + '<div style="position:relative;margin-top:38px;">'
    +   '<div style="position:absolute;left:6px;top:12px;bottom:24px;width:2px;background:var(--line);"></div>'
    +   groupsHtml
    + '</div></main>';
}

function articleView(id){
  const a = artOf(id);
  const blocks = [];
  blocks.push({ isP:true, text:a.body.intro });
  const midStock = stockOf(a.syms[0]);
  a.body.sections.forEach((sec, i) => {
    blocks.push({ isH:true, text:sec.h });
    blocks.push({ isP:true, text:sec.p });
    if (i === 0){
      const d = decStock(midStock);
      blocks.push({ isStock:true, sym:d.sym, name:d.name, price:d.price, pct:d.pct, arrow:d.arrow, color:d.color, chart:d.chart });
    }
  });
  blocks.push({ isQuote:true, text:a.body.quote, by:a.body.quoteBy });
  blocks.push({ isP:true, text:a.body.takeaway });

  const blocksHtml = blocks.map(b => {
    let inner = '';
    if (b.isH) inner = '<h2 style="font-family:var(--head);font-size:24px;font-weight:600;line-height:1.35;margin:34px 0 4px;color:var(--ink);">' + esc(b.text) + '</h2>';
    else if (b.isP) inner = '<p style="margin:0;">' + esc(b.text) + '</p>';
    else if (b.isQuote) inner = '<blockquote style="margin:6px 0;padding:6px 0 6px 22px;border-left:4px solid var(--gold);font-family:var(--head);font-size:22px;font-weight:500;line-height:1.5;color:var(--ink);">' + esc(b.text) + '<div style="font-family:\'IBM Plex Sans Thai\';font-size:13px;font-weight:600;color:var(--ink-3);margin-top:10px;">' + b.by + '</div></blockquote>';
    else if (b.isStock) inner = '<div style="display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);">'
      + '<div><div style="font-weight:700;font-size:18px;">' + b.sym + '</div><div style="font-size:12.5px;color:var(--ink-3);">' + esc(b.name) + '</div></div>'
      + '<div style="flex:1;height:44px;">' + b.chart + '</div>'
      + '<div style="text-align:right;"><div style="font-weight:700;font-size:17px;font-variant-numeric:tabular-nums;">' + b.price + '</div><div style="font-size:13px;font-weight:600;color:' + b.color + ';">' + b.arrow + b.pct + '</div></div>'
      + '</div>';
    return '<div style="margin:0 0 22px;">' + inner + '</div>';
  }).join('');

  const relStocks = a.syms.map(sym => {
    const s = stockOf(sym);
    return '<span style="display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;">' + sym
      + '<span style="color:' + col(s.pct) + ';font-weight:600;font-variant-numeric:tabular-nums;">' + arr(s.pct) + pctStr(s.pct) + '</span></span>';
  }).join('');

  const related = ARTS.filter(x => x.id !== a.id).slice(0, 3).map(x => {
    const d = decArt(x);
    return '<article data-card data-link data-article="' + d.id + '" style="cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;">'
      + '<div style="height:120px;background:repeating-linear-gradient(135deg,var(--surface-2),var(--surface-2) 10px,transparent 10px,transparent 20px),var(--surface);"></div>'
      + '<div style="padding:15px 16px 18px;"><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:8px;">' + d.cat + '</div><h3 style="font-family:var(--head);font-size:16px;font-weight:600;line-height:1.4;margin:0;">' + esc(d.title) + '</h3></div>'
      + '</article>';
  }).join('');

  return '<main data-pad style="max-width:760px;margin:0 auto;padding:30px 28px 10px;">'
    + '<div data-link data-back style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink-2);margin-bottom:22px;">← ย้อนกลับ</div>'
    + '<div style="font-size:12px;font-weight:700;letter-spacing:.05em;color:var(--gold);margin-bottom:12px;">' + a.cat + '</div>'
    + '<h1 style="font-family:var(--head);font-weight:700;font-size:35px;line-height:1.26;margin:0 0 16px;letter-spacing:-.01em;">' + esc(a.title) + '</h1>'
    + '<p style="font-size:18px;color:var(--ink-2);line-height:1.6;margin:0 0 22px;">' + esc(a.excerpt) + '</p>'
    + '<div style="display:flex;align-items:center;gap:11px;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:13.5px;color:var(--ink-3);">'
    +   '<span style="width:38px;height:38px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-weight:700;font-size:15px;">' + (a.author || 'P')[0] + '</span>'
    +   '<div style="flex:1;"><div style="font-weight:700;color:var(--ink);font-size:14px;">' + a.author + '</div><div>' + a.date + ' · อ่าน ' + a.read + ' นาที</div></div>'
    +   '<span style="font-size:12px;font-weight:600;color:var(--ink-2);border:1px solid var(--line);padding:7px 13px;border-radius:9px;cursor:pointer;">↗ แชร์</span>'
    + '</div>'
    + '<div style="height:330px;margin:26px 0;border-radius:var(--radius);background:repeating-linear-gradient(135deg,var(--surface-2),var(--surface-2) 12px,transparent 12px,transparent 24px),var(--surface);border:1px solid var(--line);display:grid;place-items:center;">'
    +   '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--ink-3);">ภาพประกอบบทความ · 1600×900</span>'
    + '</div>'
    + '<div style="font-size:17.5px;line-height:1.85;color:#3a342d;">' + blocksHtml + '</div>'
    + '<div style="margin:30px 0;padding-top:22px;border-top:1px solid var(--line);">'
    +   '<div style="font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:12px;">หุ้นที่เกี่ยวข้อง</div>'
    +   '<div style="display:flex;gap:10px;flex-wrap:wrap;">' + relStocks + '</div>'
    + '</div></main>'
    + '<div data-pad style="max-width:1200px;margin:18px auto 0;padding:30px 28px 0;border-top:1px solid var(--line);">'
    +   '<h2 style="font-family:var(--head);font-size:21px;font-weight:700;margin:0 0 18px;">อ่านต่อ</h2>'
    +   '<div data-herogrid style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;">' + related + '</div>'
    + '</div>';
}

    + '</div></footer>';

/* ============================ RENDER ============================ */
const app = document.getElementById('app');

function applyTheme(){
  const t = themes[settings.theme] || themes.warm;
  for (const k in t) app.style.setProperty(k, t[k]);
  app.style.setProperty('--fs', String(settings.fontScale));
}

function render(){
  let main = '';
  if (state.route.page === 'home') main = homeView();
  else if (state.route.page === 'news') main = newsView();
  else if (state.route.page === 'article') main = articleView(state.route.id);
  app.innerHTML = headerView() + tickerView() + main + footerView();
  applyTheme();
}

/* delegated navigation */
app.addEventListener('click', e => {
  const a = e.target.closest('[data-article]');
  if (a){ go('article', parseInt(a.getAttribute('data-article'), 10)); return; }
  const b = e.target.closest('[data-back]');
  if (b){ back(); return; }
  const g = e.target.closest('[data-go]');
  if (g){ go(g.getAttribute('data-go')); return; }
});
/* keep clicks inside form fields from bubbling to nav cards */
app.addEventListener('click', e => { if (e.target.closest('input,button')) e.stopPropagation(); }, true);

/* ============================ SETTINGS WIDGET ============================ */
const gear = document.getElementById('pv-gear');
const panel = document.getElementById('pv-panel');
gear.addEventListener('click', () => panel.classList.toggle('open'));
document.addEventListener('click', e => {
  if (!e.target.closest('#pv-settings')) panel.classList.remove('open');
});
function syncSwatches(){
  document.querySelectorAll('.pv-swatch').forEach(el =>
    el.classList.toggle('active', el.getAttribute('data-theme') === settings.theme));
}
document.querySelectorAll('.pv-swatch').forEach(el => el.addEventListener('click', () => {
  settings.theme = el.getAttribute('data-theme');
  syncSwatches(); applyTheme();
}));
document.getElementById('pv-fs').addEventListener('input', e => {
  settings.fontScale = parseFloat(e.target.value); applyTheme();
});
document.getElementById('pv-ticker').addEventListener('change', e => {
  settings.showTicker = e.target.checked; render();
});

/* ============================ BOOT ============================ */
syncSwatches();
render();
</script>
